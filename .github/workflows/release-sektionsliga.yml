name: Release Sektionsliga

on:
  push:
    tags:
      - 'sektionsliga-v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  Build_Windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish Sektionsliga/Sektionsliga.csproj `
            -r win-x64 -c Release --self-contained true -o ./out
          Get-ChildItem ./out -Filter "*.pdb" | Remove-Item -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ./out/Sektionsliga.exe

  Build_Mac:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - rid: osx-x64
            suffix: macos-x64
          - rid: osx-arm64
            suffix: macos-arm64
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes 2>/dev/null || true
          brew cleanup --prune=all 2>/dev/null || true
          df -h /

      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          dotnet publish Sektionsliga/Sektionsliga.csproj \
            -r ${{ matrix.rid }} -c Release --self-contained true -o ./out

      - name: Create .app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE=./out/Sektionsliga.app
          LOGO=Sektionsliga/Assets/Disag/Logo.png

          mkdir -p "$BUNDLE/Contents/MacOS"
          mkdir -p "$BUNDLE/Contents/Resources"
          mv ./out/Sektionsliga "$BUNDLE/Contents/MacOS/"

          ICONSET="$BUNDLE/Contents/Resources/AppIcon.iconset"
          mkdir -p "$ICONSET"
          for SIZE in 16 32 64 128 256; do
            sips -z $SIZE $SIZE "$LOGO" --out "$ICONSET/icon_${SIZE}x${SIZE}.png" > /dev/null
          done
          for SIZE in 32 64 128 256; do
            HALF=$((SIZE/2))
            sips -z $SIZE $SIZE "$LOGO" --out "$ICONSET/icon_${HALF}x${HALF}@2x.png" > /dev/null
          done
          iconutil -c icns "$ICONSET" -o "$BUNDLE/Contents/Resources/AppIcon.icns"
          rm -rf "$ICONSET"

          cat > "$BUNDLE/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key><string>Sektionsliga</string>
              <key>CFBundleDisplayName</key><string>Sektionsliga</string>
              <key>CFBundleIdentifier</key><string>de.fn.sektionsliga</string>
              <key>CFBundleVersion</key><string>$VERSION</string>
              <key>CFBundleShortVersionString</key><string>$VERSION</string>
              <key>CFBundleExecutable</key><string>Sektionsliga</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleIconFile</key><string>AppIcon</string>
              <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

          codesign --deep --force --sign - "$BUNDLE"

          hdiutil create -volname "Sektionsliga" \
            -srcfolder "$BUNDLE" -ov -format UDZO \
            "./out/Sektionsliga-${{ matrix.suffix }}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: ./out/Sektionsliga-${{ matrix.suffix }}.dmg

  Build_Linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          dotnet publish Sektionsliga/Sektionsliga.csproj \
            -r linux-x64 -c Release --self-contained true -o ./out
          find ./out -name "*.pdb" -delete

      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O appimagetool
          chmod +x appimagetool

      - name: Create AppImage
        run: |
          APPDIR=./AppDir
          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          mv ./out/Sektionsliga "$APPDIR/usr/bin/"
          cp Sektionsliga/Assets/Disag/Logo.png "$APPDIR/Sektionsliga.png"
          cp Sektionsliga/Assets/Disag/Logo.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/Sektionsliga.png"

          cat > "$APPDIR/AppRun" << 'APPRUN'
          #!/bin/sh
          exec "$APPDIR/usr/bin/Sektionsliga" "$@"
          APPRUN
          chmod +x "$APPDIR/AppRun"

          cat > "$APPDIR/Sektionsliga.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=Sektionsliga
          Exec=Sektionsliga
          Icon=Sektionsliga
          Type=Application
          Categories=Sports;
          DESKTOP

          ARCH=x86_64 ./appimagetool --appimage-extract-and-run \
            "$APPDIR" ./out/Sektionsliga.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: ./out/Sektionsliga.AppImage

  Create_Release:
    needs: [Build_Windows, Build_Mac, Build_Linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Zip artifacts
        run: |
          zip -j Sektionsliga-windows.zip      ./artifacts/windows/Sektionsliga.exe
          zip -j Sektionsliga-macos-x64.zip   ./artifacts/macos-x64/Sektionsliga-macos-x64.dmg
          zip -j Sektionsliga-macos-arm64.zip ./artifacts/macos-arm64/Sektionsliga-macos-arm64.dmg
          zip -j Sektionsliga-linux.zip        ./artifacts/linux/Sektionsliga.AppImage

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Sektionsliga ${{ github.ref_name }}" \
            --generate-notes \
            "./Sektionsliga-windows.zip" \
            "./Sektionsliga-macos-x64.zip" \
            "./Sektionsliga-macos-arm64.zip" \
            "./Sektionsliga-linux.zip"
