name: Release Shoootz

on:
  push:
    tags:
      - 'shoootz-v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  Build_Windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore tools
        run: dotnet tool restore

      - name: Publish
        shell: pwsh
        run: dotnet publish Shoootz/Shoootz.csproj -r win-x64 -c Release -o ./out

      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: ./out/Shoootz.exe

  Build_Mac:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - rid: osx-x64
            suffix: macos-x64
          - rid: osx-arm64
            suffix: macos-arm64
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes 2>/dev/null || true
          brew cleanup --prune=all 2>/dev/null || true
          df -h /

      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore tools
        run: dotnet tool restore

      - name: Publish
        run: dotnet publish Shoootz/Shoootz.csproj -r ${{ matrix.rid }} -c Release -o ./out

      - name: Create .app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE=./out/Shoootz.app
          LOGO=Shoootz/Assets/Disag/Logo.png

          mkdir -p "$BUNDLE/Contents/MacOS"
          mkdir -p "$BUNDLE/Contents/Resources"
          mv ./out/Shoootz "$BUNDLE/Contents/MacOS/"

          ICONSET="$BUNDLE/Contents/Resources/AppIcon.iconset"
          mkdir -p "$ICONSET"
          for SIZE in 16 32 64 128 256; do
            sips -z $SIZE $SIZE "$LOGO" --out "$ICONSET/icon_${SIZE}x${SIZE}.png" > /dev/null
          done
          for SIZE in 32 64 128 256; do
            HALF=$((SIZE/2))
            sips -z $SIZE $SIZE "$LOGO" --out "$ICONSET/icon_${HALF}x${HALF}@2x.png" > /dev/null
          done
          iconutil -c icns "$ICONSET" -o "$BUNDLE/Contents/Resources/AppIcon.icns"
          rm -rf "$ICONSET"

          cat > "$BUNDLE/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key><string>Shoootz</string>
              <key>CFBundleDisplayName</key><string>Shoootz</string>
              <key>CFBundleIdentifier</key><string>de.fn.shoootz</string>
              <key>CFBundleVersion</key><string>$VERSION</string>
              <key>CFBundleShortVersionString</key><string>$VERSION</string>
              <key>CFBundleExecutable</key><string>Shoootz</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleIconFile</key><string>AppIcon</string>
              <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

          codesign --deep --force --sign - "$BUNDLE"

          hdiutil create -volname "Shoootz" \
            -srcfolder "$BUNDLE" -ov -format UDZO \
            "./out/Shoootz-${{ matrix.suffix }}.dmg"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.suffix }}
          path: ./out/Shoootz-${{ matrix.suffix }}.dmg

  Build_Linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore tools
        run: dotnet tool restore

      - name: Publish
        run: dotnet publish Shoootz/Shoootz.csproj -r linux-x64 -c Release -o ./out

      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O appimagetool
          chmod +x appimagetool

      - name: Create AppImage
        run: |
          APPDIR=./AppDir
          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          mv ./out/Shoootz "$APPDIR/usr/bin/"
          cp Shoootz/Assets/Disag/Logo.png "$APPDIR/Shoootz.png"
          cp Shoootz/Assets/Disag/Logo.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/Shoootz.png"

          cat > "$APPDIR/AppRun" << 'APPRUN'
          #!/bin/sh
          exec "$APPDIR/usr/bin/Shoootz" "$@"
          APPRUN
          chmod +x "$APPDIR/AppRun"

          cat > "$APPDIR/Shoootz.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=Shoootz
          Exec=Shoootz
          Icon=Shoootz
          Type=Application
          Categories=Sports;
          DESKTOP

          ARCH=x86_64 ./appimagetool --appimage-extract-and-run \
            "$APPDIR" ./out/Shoootz.AppImage

      - uses: actions/upload-artifact@v7
        with:
          name: linux
          path: ./out/Shoootz.AppImage

  Create_Release:
    needs: [Build_Windows, Build_Mac, Build_Linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Zip artifacts
        run: |
          zip -j Shoootz-windows.zip      ./artifacts/windows/Shoootz.exe
          zip -j Shoootz-macos-x64.zip   ./artifacts/macos-x64/Shoootz-macos-x64.dmg
          zip -j Shoootz-macos-arm64.zip ./artifacts/macos-arm64/Shoootz-macos-arm64.dmg
          zip -j Shoootz-linux.zip        ./artifacts/linux/Shoootz.AppImage

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          VERSION="${GITHUB_REF_NAME#shoootz-}"
          gh release create ${{ github.ref_name }} \
            --title "Shoootz $VERSION" \
            --generate-notes \
            "./Shoootz-windows.zip" \
            "./Shoootz-macos-x64.zip" \
            "./Shoootz-macos-arm64.zip" \
            "./Shoootz-linux.zip"
